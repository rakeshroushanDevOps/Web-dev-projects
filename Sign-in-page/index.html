<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign In</title>
</head>

<body>
    <div class="login">
        <form action="#" class="login_form">
            <h1 class="login_title">Sign In</h1>

            <div class="login_inputs">
                <div class="login_box">
                    <label for="login_email">Email:</label>
                    <input type="email" class="login_input" placeholder="EMAIL" required id="login_email">
                </div>

                <div class="login_box">
                    <label for="login_password">Password:</label>
                    <input type="password" class="login_input" placeholder="PASSWORD" required id="login_password">
                </div>
            </div>

            <div class="login_check">
                <div class="login_checkbox">
                    <input type="checkbox" class="login_check-input" id="user-check">
                    <label for="user-check" class="login_check-label">Remember me</label>
                </div>

                <a href="#" class="login_forgot">Forgot Password</a>
            </div>

            <button class="login_button" type="submit">Sign In</button>

            <div class="login_register">
                Don't have any account?

                <a href="#">Register</a>
            </div>
        </form>
    </div>
</body>

</html>
